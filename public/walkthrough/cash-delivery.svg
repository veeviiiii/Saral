<svg viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pay cash and take the receipt at the door">
  <rect width="240" height="160" rx="14" fill="#EAECF7"/>
  <!-- banknote -->
  <rect x="34" y="50" width="86" height="50" rx="8" fill="#FFFFFF" stroke="#1B7F5C" stroke-width="2.5"/>
  <circle cx="77" cy="75" r="13" fill="#1B7F5C" opacity="0.15"/>
  <text x="77" y="81" font-family="sans-serif" font-size="17" font-weight="700" fill="#1B7F5C" text-anchor="middle">₹</text>
  <circle cx="46" cy="62" r="3" fill="#1B7F5C" opacity="0.4"/>
  <circle cx="108" cy="88" r="3" fill="#1B7F5C" opacity="0.4"/>
  <!-- gas cylinder -->
  <rect x="150" y="58" width="34" height="52" rx="12" fill="#FFFFFF" stroke="#1E2A78" stroke-width="2.5"/>
  <rect x="162" y="46" width="10" height="14" rx="3" fill="#1E2A78"/>
  <rect x="156" y="42" width="22" height="7" rx="3" fill="#1E2A78"/>
  <rect x="150" y="84" width="34" height="6" fill="#1E2A78" opacity="0.18"/>
  <!-- receipt -->
  <rect x="194" y="62" width="22" height="40" rx="3" fill="#FFFFFF" stroke="#F4A300" stroke-width="2.5"/>
  <g fill="#1E2A78" opacity="0.4"><rect x="198" y="70" width="14" height="3" rx="1.5"/><rect x="198" y="77" width="14" height="3" rx="1.5"/><rect x="198" y="84" width="10" height="3" rx="1.5"/></g>
</svg>
