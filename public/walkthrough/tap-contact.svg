<svg viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tap to choose a person or number">
  <rect width="240" height="160" rx="14" fill="#EAECF7"/>
  <!-- the control itself -->
  <rect x="28" y="42" width="184" height="74" rx="18" fill="#FFF4DC" stroke="#F4A300" stroke-width="4"/>
  <!-- detailed person icon -->
  <circle cx="66" cy="72" r="12" fill="#1E2A78"/>
  <path d="M48 100 a18 16 0 0 1 36 0 Z" fill="#1E2A78"/>
  <!-- small phone / number badge -->
  <circle cx="90" cy="94" r="11" fill="#F4A300"/>
  <path d="M85 90 a2 2 0 0 1 2 -2 h2 l1.5 4 -2 1.5 a8 8 0 0 0 4 4 l1.5 -2 4 1.5 v2 a2 2 0 0 1 -2 2 c-6 0 -11 -5 -11 -11 Z" fill="#FFFFFF"/>
  <!-- label lines -->
  <rect x="116" y="68" width="78" height="10" rx="5" fill="#1E2A78" opacity="0.55"/>
  <rect x="116" y="86" width="52" height="8" rx="4" fill="#1E2A78" opacity="0.25"/>
  <!-- tap ripple -->
  <g fill="none" stroke="#F4A300" stroke-width="3">
    <circle cx="196" cy="124" r="7"/>
    <path d="M205 124 a9 9 0 0 0 -9 -9" opacity="0.5"/>
  </g>
  <circle cx="196" cy="124" r="2.5" fill="#F4A300"/>
</svg>
