<svg viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Track the delivery status">
  <rect width="240" height="160" rx="14" fill="#EAECF7"/>
  <!-- connecting line -->
  <line x1="48" y1="70" x2="192" y2="70" stroke="#1E2A78" stroke-opacity="0.2" stroke-width="4"/>
  <!-- stage 1: Booked (active) -->
  <circle cx="48" cy="70" r="15" fill="#F4A300"/>
  <path d="M41 70 l5 5 l9 -10" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="30" y="94" width="36" height="7" rx="3.5" fill="#1E2A78" opacity="0.55"/>
  <!-- stage 2: Out for delivery -->
  <circle cx="120" cy="70" r="13" fill="#FFFFFF" stroke="#1E2A78" stroke-width="3" stroke-opacity="0.3"/>
  <rect x="98" y="94" width="44" height="7" rx="3.5" fill="#1E2A78" opacity="0.25"/>
  <rect x="98" y="106" width="32" height="7" rx="3.5" fill="#1E2A78" opacity="0.25"/>
  <!-- stage 3: Delivered -->
  <circle cx="192" cy="70" r="13" fill="#FFFFFF" stroke="#1E2A78" stroke-width="3" stroke-opacity="0.3"/>
  <rect x="170" y="94" width="44" height="7" rx="3.5" fill="#1E2A78" opacity="0.25"/>
</svg>
