<svg viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tap the button to continue">
  <rect width="240" height="160" rx="14" fill="#EAECF7"/>
  <!-- the action button itself -->
  <rect x="28" y="52" width="184" height="56" rx="18" fill="#FFF4DC" stroke="#F4A300" stroke-width="4"/>
  <!-- label -->
  <rect x="50" y="75" width="86" height="11" rx="5.5" fill="#1E2A78" opacity="0.55"/>
  <!-- forward / proceed icon -->
  <circle cx="172" cy="80" r="16" fill="#F4A300"/>
  <path d="M166 72 l9 8 l-9 8" fill="none" stroke="#FFFFFF" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- tap ripple -->
  <g fill="none" stroke="#F4A300" stroke-width="3">
    <circle cx="150" cy="118" r="7"/>
    <path d="M159 118 a9 9 0 0 0 -9 -9" opacity="0.5"/>
  </g>
  <circle cx="150" cy="118" r="2.5" fill="#F4A300"/>
</svg>
