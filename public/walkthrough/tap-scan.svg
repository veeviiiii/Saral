<svg viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tap the scan button">
  <rect width="240" height="160" rx="14" fill="#EAECF7"/>
  <!-- the button (no fixed position implied — just the control itself) -->
  <rect x="28" y="42" width="184" height="74" rx="18" fill="#FFF4DC" stroke="#F4A300" stroke-width="4"/>
  <!-- detailed scan / QR-camera icon -->
  <g stroke="#1E2A78" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M50 74 V62 H62"/>
    <path d="M90 62 H102 V74"/>
    <path d="M50 92 V104 H62"/>
    <path d="M90 104 H102 V92"/>
  </g>
  <g fill="#1E2A78">
    <rect x="58" y="70" width="11" height="11" rx="2"/>
    <rect x="61" y="73" width="5" height="5" rx="1" fill="#FFF4DC"/>
    <rect x="84" y="70" width="11" height="11" rx="2"/>
    <rect x="87" y="73" width="5" height="5" rx="1" fill="#FFF4DC"/>
    <rect x="58" y="86" width="11" height="11" rx="2"/>
    <rect x="61" y="89" width="5" height="5" rx="1" fill="#FFF4DC"/>
    <rect x="84" y="88" width="4" height="4"/>
    <rect x="91" y="88" width="4" height="4"/>
    <rect x="84" y="95" width="4" height="4"/>
  </g>
  <!-- scan beam -->
  <rect x="48" y="82" width="56" height="3.5" rx="1.75" fill="#F4A300"/>
  <!-- label lines -->
  <rect x="120" y="70" width="74" height="10" rx="5" fill="#1E2A78" opacity="0.55"/>
  <rect x="120" y="88" width="50" height="8" rx="4" fill="#1E2A78" opacity="0.25"/>
  <!-- tap ripple -->
  <g fill="none" stroke="#F4A300" stroke-width="3">
    <circle cx="196" cy="124" r="7"/>
    <path d="M205 124 a9 9 0 0 0 -9 -9" opacity="0.5"/>
  </g>
  <circle cx="196" cy="124" r="2.5" fill="#F4A300"/>
</svg>
