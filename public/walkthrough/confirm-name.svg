<svg viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Check the name that appears">
  <rect width="240" height="160" rx="14" fill="#EAECF7"/>
  <!-- the recipient card, highlighted -->
  <rect x="30" y="44" width="180" height="72" rx="14" fill="#FFFFFF" stroke="#F4A300" stroke-width="3.5"/>
  <!-- avatar -->
  <circle cx="66" cy="80" r="20" fill="#EAECF7"/>
  <circle cx="66" cy="73" r="7" fill="#1E2A78" opacity="0.55"/>
  <path d="M52 96 a14 12 0 0 1 28 0" fill="#1E2A78" opacity="0.55"/>
  <!-- name line -->
  <rect x="98" y="66" width="74" height="9" rx="4.5" fill="#1E2A78" opacity="0.6"/>
  <!-- number line -->
  <rect x="98" y="82" width="54" height="7" rx="3.5" fill="#1E2A78" opacity="0.25"/>
  <!-- green tick badge -->
  <circle cx="186" cy="64" r="12" fill="#1B7F5C"/>
  <path d="M180 64 l4 4 l8 -9" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
