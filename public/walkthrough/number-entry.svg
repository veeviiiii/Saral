    <rect x="166" y="78" width="44" height="22" rx="6" fill="#FFFFFF"/><text x="188" y="94">6</text>
    <rect x="30" y="104" width="44" height="22" rx="6" fill="#FFFFFF"/><text x="52" y="120">7</text>
