    <rect x="30" y="52" width="44" height="22" rx="6" fill="#FFFFFF"/><text x="52" y="68">1</text>
    <rect x="98" y="52" width="44" height="22" rx="6" fill="#FFFFFF"/><text x="120" y="68">2</text>
