<svg viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dial the code and press call">
  <rect width="240" height="160" rx="14" fill="#EAECF7"/>
  <!-- code display (highlighted) -->
  <rect x="46" y="14" width="148" height="28" rx="8" fill="#FFFFFF" stroke="#F4A300" stroke-width="3"/>
  <text x="120" y="34" font-family="sans-serif" font-size="18" font-weight="700" fill="#1A1A1A" text-anchor="middle" letter-spacing="2">*1#</text>
  <!-- mini dial pad -->
  <g font-family="sans-serif" font-size="13" font-weight="600" fill="#1A1A1A" text-anchor="middle">
    <circle cx="78" cy="62" r="11" fill="#FFFFFF"/><text x="78" y="66">1</text>
    <circle cx="108" cy="62" r="11" fill="#FFFFFF"/><text x="108" y="66">2</text>
    <circle cx="138" cy="62" r="11" fill="#FFFFFF"/><text x="138" y="66">3</text>
    <circle cx="78" cy="88" r="11" fill="#FFFFFF"/><text x="78" y="92">4</text>
    <circle cx="108" cy="88" r="11" fill="#FFFFFF"/><text x="108" y="92">5</text>
    <circle cx="138" cy="88" r="11" fill="#FFFFFF"/><text x="138" y="92">6</text>
    <circle cx="78" cy="114" r="11" fill="#FFFFFF"/><text x="78" y="118">*</text>
    <circle cx="108" cy="114" r="11" fill="#FFFFFF"/><text x="108" y="118">0</text>
    <circle cx="138" cy="114" r="11" fill="#FFFFFF"/><text x="138" y="118">#</text>
  </g>
  <!-- green call button -->
  <circle cx="178" cy="100" r="18" fill="#1B7F5C"/>
  <path d="M171 92 a2 2 0 0 1 2 -2 h3 l2 5 -2.5 2 a10 10 0 0 0 5 5 l2 -2.5 5 2 v3 a2 2 0 0 1 -2 2 c-8 0 -16 -8 -16 -16 Z" fill="#FFFFFF"/>
</svg>
