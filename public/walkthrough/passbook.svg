<svg viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Find the booking number on your passbook">
  <rect width="240" height="160" rx="14" fill="#EAECF7"/>
  <!-- booklet -->
  <rect x="40" y="24" width="160" height="112" rx="10" fill="#FFFFFF" stroke="#1E2A78" stroke-width="2"/>
  <line x1="120" y1="28" x2="120" y2="132" stroke="#1E2A78" stroke-opacity="0.2" stroke-width="2"/>
  <!-- left page lines -->
  <g fill="#1E2A78" opacity="0.3"><rect x="52" y="40" width="54" height="6" rx="3"/><rect x="52" y="54" width="54" height="6" rx="3"/><rect x="52" y="68" width="40" height="6" rx="3"/></g>
  <!-- right page: highlighted booking number -->
  <rect x="60" y="92" width="120" height="6" rx="3" fill="#1E2A78" opacity="0.3"/>
  <rect x="128" y="40" width="60" height="6" rx="3" fill="#1E2A78" opacity="0.3"/>
  <rect x="128" y="56" width="64" height="26" rx="8" fill="#FFF4DC" stroke="#F4A300" stroke-width="3"/>
  <text x="160" y="73" font-family="sans-serif" font-size="12" font-weight="700" fill="#1A1A1A" text-anchor="middle">1800-...</text>
</svg>
