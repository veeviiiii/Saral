<svg viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A confirmation SMS arrives">
  <rect width="240" height="160" rx="14" fill="#EAECF7"/>
  <!-- message bubble -->
  <rect x="34" y="36" width="172" height="88" rx="16" fill="#FFFFFF"/>
  <path d="M48 124 l0 14 l14 -14 z" fill="#FFFFFF"/>
  <!-- little message icon header -->
  <g fill="#1E2A78" opacity="0.35"><rect x="48" y="50" width="20" height="14" rx="3"/><path d="M48 53 l10 6 l10 -6" fill="none" stroke="#FFFFFF" stroke-width="2"/></g>
  <rect x="76" y="52" width="74" height="8" rx="4" fill="#1E2A78" opacity="0.3"/>
  <!-- message lines -->
  <rect x="48" y="76" width="140" height="8" rx="4" fill="#1E2A78" opacity="0.5"/>
  <rect x="48" y="92" width="110" height="8" rx="4" fill="#1E2A78" opacity="0.35"/>
  <!-- success tick -->
  <circle cx="184" cy="104" r="14" fill="#1B7F5C"/>
  <path d="M177 104 l5 5 l9 -10" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
