<svg viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Open the app from your home screen">
  <rect width="240" height="160" rx="14" fill="#EAECF7"/>
  <!-- phone -->
  <rect x="74" y="8" width="92" height="144" rx="14" fill="#FFFFFF" stroke="#1E2A78" stroke-opacity="0.15" stroke-width="2"/>
  <rect x="108" y="14" width="24" height="4" rx="2" fill="#1E2A78" opacity="0.18"/>
  <!-- app grid with small recognisable glyphs -->
  <!-- camera app -->
  <rect x="84" y="28" width="20" height="20" rx="6" fill="#EAECF7"/>
  <circle cx="94" cy="38" r="4.5" fill="none" stroke="#1E2A78" stroke-width="2" opacity="0.6"/>
  <!-- chat app -->
  <rect x="110" y="28" width="20" height="20" rx="6" fill="#EAECF7"/>
  <path d="M114 34 h12 v6 h-6 l-3 3 v-3 h-3 z" fill="#1E2A78" opacity="0.6"/>
  <!-- clock app -->
  <rect x="136" y="28" width="20" height="20" rx="6" fill="#EAECF7"/>
  <circle cx="146" cy="38" r="6" fill="none" stroke="#1E2A78" stroke-width="2" opacity="0.6"/>
  <path d="M146 35 v3 h2.5" fill="none" stroke="#1E2A78" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <!-- highlighted payments app (the one to open) -->
  <rect x="82" y="58" width="24" height="24" rx="7" fill="#FFF4DC" stroke="#F4A300" stroke-width="3.5"/>
  <text x="94" y="76" font-family="sans-serif" font-size="14" font-weight="700" fill="#1E2A78" text-anchor="middle">₹</text>
  <!-- other apps -->
  <rect x="110" y="60" width="20" height="20" rx="6" fill="#EAECF7"/>
  <rect x="115" y="65" width="10" height="10" rx="2" fill="none" stroke="#1E2A78" stroke-width="2" opacity="0.6"/>
  <rect x="136" y="60" width="20" height="20" rx="6" fill="#EAECF7"/>
  <path d="M141 70 h10 M146 65 v10" stroke="#1E2A78" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <!-- dock -->
  <rect x="84" y="124" width="72" height="18" rx="9" fill="#EAECF7"/>
  <!-- tap pointer to the highlighted app -->
  <g stroke="#F4A300" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M186 104 L110 78"/>
    <polyline points="116,73 108,77 112,85"/>
  </g>
</svg>
