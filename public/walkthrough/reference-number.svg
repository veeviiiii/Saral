<svg viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Note the reference number and keep it safe">
  <rect width="240" height="160" rx="14" fill="#EAECF7"/>
  <rect x="26" y="18" width="188" height="124" rx="13" fill="#FFFFFF"/>
  <!-- success tick -->
  <circle cx="120" cy="44" r="16" fill="#1B7F5C"/>
  <path d="M112 44 l5 5 l11 -12" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- reference number label -->
  <rect x="74" y="72" width="92" height="6" rx="3" fill="#1E2A78" opacity="0.3"/>
  <!-- highlighted number -->
  <rect x="46" y="84" width="148" height="30" rx="9" fill="none" stroke="#F4A300" stroke-width="3"/>
  <text x="120" y="105" font-family="sans-serif" font-size="16" font-weight="700" fill="#1A1A1A" text-anchor="middle" letter-spacing="2">AB 1234567</text>
  <!-- screenshot / save hint -->
