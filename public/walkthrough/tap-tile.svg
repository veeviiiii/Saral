<svg viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tap one tile from the grid">
  <rect width="240" height="160" rx="14" fill="#EAECF7"/>
  <!-- phone -->
  <rect x="82" y="8" width="76" height="144" rx="14" fill="#FFFFFF" stroke="#1E2A78" stroke-opacity="0.15" stroke-width="2"/>
  <rect x="90" y="18" width="40" height="8" rx="4" fill="#1E2A78" opacity="0.25"/>
  <!-- grid of tiles -->
  <g>
    <!-- highlighted tile (top-left) -->
    <rect x="90" y="34" width="28" height="30" rx="7" fill="#FFF4DC" stroke="#F4A300" stroke-width="3.5"/>
    <circle cx="104" cy="46" r="6" fill="#F4A300"/>
    <rect x="96" y="56" width="16" height="4" rx="2" fill="#1E2A78" opacity="0.5"/>
    <rect x="122" y="34" width="28" height="30" rx="7" fill="#EAECF7"/>
    <rect x="90" y="70" width="28" height="30" rx="7" fill="#EAECF7"/>
    <rect x="122" y="70" width="28" height="30" rx="7" fill="#EAECF7"/>
  </g>
  <!-- tap arrow -->
  <g stroke="#F4A300" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M176 86 L118 58"/>
    <polyline points="124,54 116,57 120,64"/>
  </g>
</svg>
